name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --filter "Category!=Integration" --verbosity normal

      - name: Publish
        run: dotnet publish src/StreamTitleService/StreamTitleService.csproj --configuration Release --output ./publish

      # TODO: Migrate to OIDC workload identity federation for short-lived credentials
      # See: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
      # Requires: Azure AD federated credential on the service principal
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.FUNCTION_APP_NAME }}
          package: ./publish
